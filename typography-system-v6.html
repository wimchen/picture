t:900;width:72%;left:8%;top:17%}.titleobj mark{background:var(--orange);color:white;padding:0 5px}.kicker{left:8%;top:8%;font-size:10px;letter-spacing:.18em;font-weight:700}.copyobj{left:8%;bottom:17%;width:65%;font-size:12px;line-height:1.6}.shape{right:-15%;top:25%;width:54%;aspect-ratio:1;border:34px solid var(--orange);border-radius:50%}.footobj{left:8%;right:8%;bottom:6%;border-top:2px solid;padding-top:9px;display:flex;justify-content:space-between;font-size:9px;font-weight:700}.imgobj{width:42%;height:28%;right:7%;top:46%;object-fit:cover;border:5px solid white;box-shadow:5px 5px 0 #171719;display:none}.annotation{right:5%;top:12%;color:#e25139;font:10px "Comic Sans MS";transform:rotate(5deg);border:2px solid;border-radius:50%;padding:6px}.bottombar{background:var(--panel);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:7px}.bottombar button{height:31px;border:1px solid var(--line);background:var(--panel);border-radius:6px;padding:0 11px;font-size:10px}.bottombar button:hover{border-color:var(--ink)}.prop{margin:11px 0}.prop label{font-size:9px;color:var(--muted);display:block;margin-bottom:5px}.prop input,.prop select,.prop textarea{width:100%;border:1px solid var(--line);background:var(--panel);border-radius:6px;padding:7px;font-size:10px}.prop textarea{resize:vertical;min-height:56px}.row{display:grid;grid-template-columns:1fr 1fr;gap:7px}.rangehead{display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px}.prop input[type=range]{padding:0;accent-color:var(--blue)}.aligns{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.aligns button{height:30px;border:1px solid var(--line);background:var(--panel);border-radius:5px}.aligns button.on{background:var(--ink);color:#fff}.danger{width:100%;height:34px;border:1px solid #dc4d40;background:#fff;color:#c83d31;border-radius:7px;font-size:10px}.empty{font-size:10px;color:var(--muted);line-height:1.6}.toast{display:none;position:fixed;z-index:99;left:50%;bottom:24px;transform:translateX(-50%);background:#171719;color:#fff;padding:10px 16px;border-radius:8px;font-size:10px}.dark{--bg:#18181b;--panel:#242428;--ink:#f2f0ea;--muted:#99999e;--line:#3b3b40}.dark .canvas{color:#19191c}.dark .actions .primary,.dark .auto{background:#f2f0ea;color:#171719}.dark .danger{background:transparent}.dark .sizes button.on{background:#333338}@media(max-width:900px){.layout{grid-template-columns:200px 1fr}.right{display:none}}@media(max-width:650px){.layout{grid-template-columns:1fr}.left{display:none}.canvas{height:min(70vh,560px)}.actions button:not(.primary){display:none}}

<header class="top"><div class="brand"><span class="logo"></span>智能分层排版 <span class="tag">VISION V4</span></div><div class="actions"><button id="theme">◐</button><button onclick="saveLocal()">保存</button><button class="primary" onclick="exportJSON()">导出版式 ↗</button></div></header>
<main class="layout"><aside class="side left"><section class="block"><div class="head"><span>添加对象</span><small>独立图层</small></div><div class="addgrid"><button onclick="addText()">＋ 文字</button><button onclick="addShape()">＋ 色块</button><button onclick="imageInput.click()">＋ 图片</button><button onclick="addNote()">＋ 批注</button></div><input id="imageInput" type="file" accept="image/*" hidden></section><section class="block"><div class="head"><span>图层</span><small id="count"></small></div><div class="layers" id="layers"></div><div class="hint">拖动图层可调整前后顺序 ↕</div></section><section class="block"><div class="head"><span>智能排版</span><small>自动 / 手动</small></div><button class="auto" onclick="autoLayout()">✦ 自动整理当前画布</button><div class="addgrid" style="margin-top:7px"><button onclick="distribute('x')">横向分布</button><button onclick="distribute('y')">纵向分布</button></div></section></aside>
<section class="center"><div class="toolbar"><span>画布 / <b>对象排版</b>　<span id="canvasInfo" style="color:var(--muted)">1080 × 1920</span></span><div class="sizes"><button class="on" data-ratio="9/16" data-size="1080 × 1920">9:16</button><button data-ratio="3/4" data-size="1080 × 1440">3:4</button><button data-ratio="1/1" data-size="1080 × 1080">1:1</button><button data-ratio="16/9" data-size="1920 × 1080">16:9</button></div><span>−　72%　＋</span></div><div class="canvasarea"><div class="canvas" id="canvas"><div class="grid" id="grid"><i></i><i></i><i></i><i></i><i></i><i></i></div></div></div><div class="bottombar"><button onclick="grid.classList.toggle('on')">▦ 网格</button><button onclick="duplicateSelected()">⧉ 复制</button><button onclick="moveLayer(1)">↑ 上移</button><button onclick="moveLayer(-1)">↓ 下移</button><button onclick="editSelected()">✎ 编辑</button><button onclick="deleteSelected()">⌫ 删除</button></div></section>
<aside class="side right"><section class="block"><div class="head"><span>对象属性</span><small id="typeLabel">未选择</small></div><div id="properties" class="empty">点击画布中的对象或左侧图层，即可编辑文字、位置、大小与样式。<br><br>快捷操作：双击文字直接编辑，Delete 删除，方向键微调位置。</div></section><section class="block"><div class="head"><span>画布设置</span></div><div class="prop"><label>背景色</label><input type="color" id="bgColor" value="#eee1c9"></div><div class="row"><div class="prop"><label>安全边距</label><input type="number" value="8" min="0" max="30" id="safeMargin"></div><div class="prop"><label>单位</label><select><option>百分比 %</option><option>像素 px</option></select></div></div></section></aside></main><div class="toast" id="toast"></div>

<script>
const C=document.getElementById('canvas');let selected=null,drag=null,seq=0;let objects=[
{id:'o1',type:'text',name:'英文眉题',html:'DESIGN IS A WAY OF THINKING',cls:'kicker'},
{id:'o2',type:'text',name:'主标题',html:'让文字<br><mark>建立秩序</mark>',cls:'titleobj'},
{id:'o3',type:'shape',name:'强调圆环',html:'',cls:'shape'},
{id:'o4',type:'text',name:'正文描述',html:'好的排版不是装饰，而是在复杂信息中建立清晰的观看路径。先看见，再理解，最后记住。',cls:'copyobj'},
{id:'o5',type:'text',name:'页脚信息',html:'<span>TYPOGRAPHY / 01</span><span>2026 ↗</span>',cls:'footobj'},
{id:'o6',type:'note',name:'手写批注',html:'重点放大！',cls:'annotation'}];
function render(){C.querySelectorAll('.obj').forEach(x=>x.remove());objects.forEach((o,i)=>{let e=o.type==='image'?document.createElement('img'):document.createElement('div');e.id=o.id;e.className='obj '+o.cls+(selected===o.id?' selected':'');e.dataset.type=o.type;e.style.zIndex=i+2;if(o.type==='image'){e.src=o.src;e.style.display='block'}else e.innerHTML=o.html;e.onclick=ev=>{ev.stopPropagation();select(o.id)};e.ondblclick=ev=>{ev.stopPropagation();if(o.type==='text'||o.type==='note')beginEdit(e,o)};e.onpointerdown=startDrag;C.appendChild(e)});renderLayers();renderProps()}
function renderLayers(){layers.innerHTML=[...objects].reverse().map(o=>`<button draggable="true" ondragstart="layerDrag(event,'${o.id}')" ondragover="event.preventDefault()" ondrop="layerDrop(event,'${o.id}')" class="layer ${selected===o.id?'on':''}" onclick="select('${o.id}')"><i>${icon(o.type)}</i><span>${o.name}</span><span class="eye">◉</span></button>`).join('');count.textContent=objects.length+' 个对象'}function icon(t){return {text:'T',shape:'◆',image:'▧',note:'✎'}[t]}
function select(id){selected=id;render()}C.onclick=()=>{selected=null;render()};
function startDrag(e){if(e.target.contentEditable==='true')return;select(e.currentTarget.id);let el=document.getElementById(selected),r=C.getBoundingClientRect(),er=el.getBoundingClientRect();drag={el,startX:e.clientX,startY:e.clientY,left:(er.left-r.left)/r.width*100,top:(er.top-r.top)/r.height*100};el.setPointerCapture(e.pointerId);el.onpointermove=moveDrag;el.onpointerup=endDrag}
function moveDrag(e){if(!drag)return;let r=C.getBoundingClientRect();let x=Math.max(-20,Math.min(95,drag.left+(e.clientX-drag.startX)/r.width*100));let y=Math.max(-20,Math.min(95,drag.top+(e.clientY-drag.startY)/r.height*100));drag.el.style.left=x+'%';drag.el.style.top=y+'%';drag.el.style.right='auto';drag.el.style.bottom='auto'}function endDrag(){syncStyle(drag.el);drag=null;renderProps()}
function syncStyle(el){let o=objects.find(x=>x.id===el.id);o.style=el.getAttribute('style')||''}
function beginEdit(el,o){el.contentEditable='true';el.focus();el.onblur=()=>{o.html=el.innerHTML;el.contentEditable='false';render()}}
function editSelected(){if(!selected)return;let o=objects.find(x=>x.id===selected),e=document.getElementById(selected);if(o.type==='text'||o.type==='note')beginEdit(e,o)}
function deleteSelected(){if(!selected)return;objects=objects.filter(x=>x.id!==selected);selected=null;render();notify('对象已删除')}
function addText(){let id='n'+(++seq);objects.push({id,type:'text',name:'新文字',html:'双击编辑文字',cls:'copyobj',style:'left:15%;top:40%;bottom:auto'});selected=id;render()}
function addShape(){let id='n'+(++seq);objects.push({id,type:'shape',name:'新色块',html:'',cls:'shape',style:'left:35%;top:35%;right:auto;width:30%;border:0;border-radius:12px;background:#4c5fe8'});selected=id;render()}
function addNote(){let id='n'+(++seq);objects.push({id,type:'note',name:'新批注',html:'双击批注',cls:'annotation',style:'left:60%;top:20%;right:auto'});selected=id;render()}
imageInput.onchange=e=>{let f=e.target.files[0];if(f)analyzeImageV6(f);e.target.value=''}

async function analyzeImage(file){process.classList.add('on');setProgress(8,'读取图片并建立像素索引…',0);let url=await readFile(file),img=await loadImage(url);setProgress(24,'分析主色、亮度与边缘结构…',1);await pause(120);let max=480,scale=Math.min(1,max/Math.max(img.width,img.height)),w=Math.round(img.width*scale),h=Math.round(img.height*scale),cv=document.createElement('canvas');cv.width=w;cv.height=h;let cx=cv.getContext('2d',{willReadFrequently:true});cx.drawImage(img,0,0,w,h);let source=cx.getImageData(0,0,w,h),data=source.data,k=5,centers=seedCenters(data,k),labels=new Uint8Array(w*h);for(let pass=0;pass<7;pass++){let sums=Array.from({length:k},()=>[0,0,0,0]);for(let p=0;p<w*h;p++){let q=p*4,best=0,bd=1e9;for(let j=0;j<k;j++){let c=centers[j],d=(data[q]-c[0])**2+(data[q+1]-c[1])**2+(data[q+2]-c[2])**2;if(d<bd){bd=d;best=j}}labels[p]=best;let s=sums[best];s[0]+=data[q];s[1]+=data[q+1];s[2]+=data[q+2];s[3]++}centers=sums.map((s,j)=>s[3]?[s[0]/s[3],s[1]/s[3],s[2]/s[3]]:centers[j])}setProgress(48,'聚合相邻区域，识别视觉对象…',2);await pause(120);let comps=[];for(let cluster=0;cluster<k;cluster++)comps.push(...components(labels,w,h,cluster));comps=comps.filter(c=>c.area>w*h*.006&&c.area<w*h*.82).sort((a,b)=>b.area-a.area).slice(0,10);setProgress(68,`检测到 ${comps.length} 个主要视觉区域…`,2);let imported=[];let baseId='n'+(++seq);imported.push({id:baseId,type:'image',name:'原图底层',src:url,cls:'imgobj',style:'left:0;top:0;width:100%;height:100%;right:auto;display:block;object-fit:contain;opacity:.2;border:0;box-shadow:none'});for(let i=0;i<comps.length;i++){let c=comps[i],out=document.createElement('canvas');out.width=w;out.height=h;let oc=out.getContext('2d'),layer=oc.createImageData(w,h);for(let p=0;p<w*h;p++){let x=p%w,y=(p/w)|0;if(labels[p]===c.cluster&&x>=c.x0&&x<=c.x1&&y>=c.y0&&y<=c.y1){let q=p*4;layer.data[q]=data[q];layer.data[q+1]=data[q+1];layer.data[q+2]=data[q+2];layer.data[q+3]=data[q+3]}}oc.putImageData(layer,0,0);let lum=(centers[c.cluster][0]+centers[c.cluster][1]+centers[c.cluster][2])/3,name=c.a
