<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>动画组件控制台</title>
<style>
:root{--bg:#f5f3ed;--panel:#fff;--ink:#1d1d20;--muted:#87878d;--line:#deddd8;--blue:#4b5fe8;--orange:#ff5b38}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,"PingFang SC",sans-serif;overflow:hidden}button,input,select{font:inherit}button{cursor:pointer;color:inherit}.top{height:58px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px}.logo{width:28px;height:28px;border:2px solid;border-radius:7px;display:grid;place-items:center;transform:rotate(-3deg)}.logo:after{content:"▥"}.tag{font-size:9px;background:#f5e8d5;color:#8e5c2c;padding:4px 6px;border-radius:4px}.actions{display:flex;gap:7px}.actions button{height:34px;padding:0 13px;border:1px solid var(--line);background:var(--panel);border-radius:8px;font-size:11px}.actions .export{background:var(--ink);color:#fff}.layout{height:calc(100vh - 58px);display:grid;grid-template-columns:220px 1fr 270px}.side{background:var(--panel);overflow:auto}.left{border-right:1px solid var(--line);padding:16px 13px}.right{border-left:1px solid var(--line)}.head{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin:3px 3px 14px}.search{border:1px solid var(--line);border-radius:7px;padding:8px 10px;color:var(--muted);font-size:10px}.label{font-size:9px;color:var(--muted);letter-spacing:.1em;margin:19px 5px 8px;text-transform:uppercase}.component{display:grid;grid-template-columns:34px 1fr;gap:8px;width:100%;border:1px solid transparent;background:none;border-radius:9px;padding:8px;text-align:left;margin:3px 0}.component:hover{background:var(--bg)}.component.on{border-color:var(--ink);background:var(--bg);box-shadow:3px 3px #f1bd38}.icon{width:32px;height:32px;border:1px solid var(--line);border-radius:7px;display:grid;place-items:center;background:#fff;font-size:17px}.component b,.component small{display:block}.component b{font-size:11px;margin:2px 0 4px}.component small{font-size:9px;color:var(--muted)}.note{position:absolute;left:22px;bottom:18px;color:#e25139;font:11px "Comic Sans MS";transform:rotate(-3deg);border-bottom:2px solid}.center{min-width:0;display:grid;grid-template-rows:46px 1fr 76px}.toolbar{background:var(--panel);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:0 15px;font-size:10px}.tabs{background:var(--bg);padding:3px;border-radius:7px}.tabs button{border:0;background:none;font-size:9px;padding:5px 9px;border-radius:5px}.tabs button.on{background:#fff;box-shadow:0 1px 4px #0001}.canvas{position:relative;display:grid;place-items:center;overflow:hidden;background-image:linear-gradient(#9991 1px,transparent 1px),linear-gradient(90deg,#9991 1px,transparent 1px);background-size:24px 24px}.selection{width:230px;height:230px;border:1px dashed var(--blue);display:grid;place-items:center;position:relative}.handle{position:absolute;width:7px;height:7px;background:white;border:1px solid var(--blue)}.tl{top:-4px;left:-4px}.tr{top:-4px;right:-4px}.bl{bottom:-4px;left:-4px}.br{bottom:-4px;right:-4px}.system{width:185px;height:185px;position:relative;border-radius:50%;animation:spin 5s linear infinite;transition:.2s}.orbit{position:absolute;inset:10%;border:2px solid var(--orange);border-radius:50%;transform:rotate(35deg) scaleY(.44)}.orbit.b{border-color:#7b80e7;transform:rotate(-45deg) scaleY(.55)}.core{position:absolute;left:50%;top:50%;width:68px;height:68px;transform:translate(-50%,-50%);border-radius:40% 60%;background:var(--orange);color:white;display:grid;place-items:center;font-size:28px;box-shadow:0 12px 30px #ff5b3866}.sat{position:absolute;width:12px;height:12px;border:3px solid var(--bg);box-shadow:0 0 0 1px;border-radius:50%;background:#f2b930}.s1{left:8%;top:43%}.s2{right:16%;top:14%;background:#5264ea}.s3{right:3%;bottom:27%;background:#26c99b}@keyframes spin{to{transform:rotate(360deg)}}.scribble{position:absolute;right:7%;top:16%;color:#e25139;font:12px "Comic Sans MS";transform:rotate(3deg)}.scribble b{border:2px solid;border-radius:50%;padding:5px;margin-right:4px}.scribble small{display:block;margin:9px 0 0 32px}.fps{position:absolute;left:20px;bottom:18px;background:white;border:1px solid var(--line);border-radius:20px;padding:7px 11px;font-size:9px}.fps i{display:inline-block;width:6px;height:6px;background:#28bf78;border-radius:50%;margin-right:5px}.timeline{background:var(--panel);border-top:1px solid var(--line);display:grid;grid-template-columns:110px 1fr 65px;align-items:center;padding:0 14px;gap:10px}.play button{width:30px;height:30px;border:1px solid var(--line);background:white;border-radius:50%}.play .main{background:var(--ink);color:white}.track{height:3px;background:var(--line);position:relative;cursor:pointer}.progress{height:100%;background:var(--blue);width:38%}.needle{position:absolute;left:38%;top:-7px;width:2px;height:17px;background:var(--blue)}select{border:1px solid var(--line);border-radius:6px;background:white;padding:5px;font-size:9px}.inspect{padding:16px;border-bottom:1px solid var(--line)}.inspect small,.inspect b{display:block}.inspect small{font-size:9px;color:var(--muted);margin-bottom:4px}.inspect b{font-size:13px}.section{padding:15px 17px;border-bottom:1px solid var(--line)}.title{font-size:11px;font-weight:800;margin-bottom:13px}.presets{display:grid;grid-template-columns:1fr 1fr;gap:6px}.preset{height:48px;border:1px solid var(--line);background:white;border-radius:7px;font-size:9px;text-align:left}.preset.on{border:2px solid var(--blue);background:#f5f6ff}.preset:before{content:"⌁";display:block;font-size:20px;color:var(--blue)}.ctrl{margin:13px 0}.ctrl div,.color{display:flex;justify-content:space-between;align-items:center;font-size:10px}.ctrl code{color:var(--muted);background:var(--bg);padding:2px 5px;border-radius:4px}.ctrl input{width:100%;accent-color:var(--blue)}.color input{width:32px;height:24px;border:0;background:none}.toggle{display:flex;justify-content:space-between;align-items:center;font-size:10px;margin:14px 0}.switch{width:30px;height:17px;border:0;background:#bbb;border-radius:10px;position:relative}.switch:after{content:"";position:absolute;width:13px;height:13px;left:2px;top:2px;background:white;border-radius:50%}.switch.on{background:var(--blue)}.switch.on:after{left:15px}.tip{margin:14px;padding:10px;background:#fff8dd;border:1px solid #ebd489;border-radius:8px;font-size:9px;line-height:1.5}.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#17171a;color:#fff;border-radius:8px;padding:10px 16px;font-size:11px;display:none}.dark{--bg:#18181b;--panel:#242428;--ink:#f1efe9;--muted:#99999e;--line:#3c3c41}.dark .icon,.dark .tabs button.on,.dark select,.dark .preset,.dark .fps,.dark .play button{background:#242428;color:#eee}.dark .actions .export,.dark .play .main{background:#f1efe9;color:#17171a}@media(max-width:850px){.layout{grid-template-columns:180px 1fr}.right{display:none}}@media(max-width:600px){.layout{grid-template-columns:1fr}.left{display:none}.brand .tag{display:none}.selection{transform:scale(.78)}.scribble{display:none}}
</style></head><body>
<header class="top"><div class="brand"><span class="logo"></span>动效实验室 <span class="tag">LAB 02</span></div><div class="actions"><button id="theme">◐</button><button onclick="toast('分享链接已复制')">分享</button><button class="export" onclick="toast('React 组件代码已导出')">导出代码 ↗</button></div></header>
<main class="layout"><aside class="side left"><div class="head"><span>组件库</span><span>＋</span></div><div class="search">⌕　搜索动画组件...</div><div class="label">基础动画　05</div><div id="list"></div><div class="label">最近使用　03</div><div class="note">拖进画布试试看 ↗</div></aside>
<section class="center"><div class="toolbar"><span>画布 / <b id="crumb">轨道脉冲</b></span><div class="tabs"><button class="on">桌面</button><button>平板</button><button>手机</button></div><span>−　84%　＋　⌗</span></div><div class="canvas"><div class="selection" id="selection"><i class="handle tl"></i><i class="handle tr"></i><i class="handle bl"></i><i class="handle br"></i><div class="system" id="system"><div class="orbit" id="orbit"></div><div class="orbit b"></div><div class="core" id="core">◌</div><i class="sat s1"></i><i class="sat s2"></i><i class="sat s3"></i></div></div><div class="scribble"><b>01</b> 节奏要有呼吸感<small>别太机械！　↙</small></div><div class="fps"><i></i>实时渲染 · 60 FPS</div></div><div class="timeline"><div class="play"><button onclick="resetTime()">↶</button><button class="main" id="play">Ⅱ</button><button onclick="stepTime()">›</button></div><div class="track" id="track"><div class="progress" id="progress"></div><i class="needle" id="needle"></i></div><select id="speed"><option value=".5">0.5×</option><option value="1" selected>1.0×</option><option value="1.5">1.5×</option><option value="2">2.0×</option></select></div></section>
<aside class="side right"><div class="inspect"><small>当前组件</small><b id="current">轨道脉冲</b></div><div class="section"><div class="title">动画预设　<span style="color:#b47b00">推荐</span></div><div class="presets" id="presets"><button class="preset on">缓入缓出</button><button class="preset">弹簧回弹</button><button class="preset">匀速循环</button><button class="preset">自定义曲线</button></div></div><div class="section"><div class="title">外观</div><div class="ctrl"><div><span>尺寸</span><code id="sizeVal">72px</code></div><input id="size" type="range" min="42" max="100" value="72"></div><div class="ctrl"><div><span>旋转</span><code id="rotVal">18°</code></div><input id="rot" type="range" min="0" max="90" value="18"></div><div class="ctrl"><div><span>光晕</span><code id="blurVal">12px</code></div><input id="blur" type="range" min="0" max="30" value="12"></div><div class="color"><span>强调色</span><input id="color" type="color" value="#ff5b38"></div></div><div class="section"><div class="title">运动</div><div class="toggle"><span>无限循环</span><button class="switch on"></button></div><div class="toggle"><span>悬停暂停</span><button class="switch"></button></div></div><div class="tip">✦ <b>关键帧小贴士</b><br>拖动时间轴游标，再调整参数，即可自动记录关键帧。</div></aside></main><div class="toast" id="toast"></div>
<script>
const data=[['◌','轨道脉冲','循环'],['✦','粒子星群','粒子'],['≈','流体波纹','物理'],['▦','数据翻牌','数值'],['⌁','路径描边','矢量']];let active=0,playing=true,time=38,timer;
function render(){list.innerHTML=data.map((x,i)=>`<button class="component ${i===active?'on':''}" onclick="select(${i})"><span class="icon">${x[0]}</span><span><b>${x[1]}</b><small>${x[2]} · 可交互</small></span></button>`).join('')}
function select(i){active=i;crumb.textContent=current.textContent=data[i][1];core.textContent=data[i][0];render()}
function tick(){if(playing){time=(time+.35*+speed.value)%100;draw()}}function draw(){progress.style.width=time+'%';needle.style.left=time+'%'}function resetTime(){time=0;draw()}function stepTime(){time=Math.min(100,time+5);draw()}
play.onclick=()=>{playing=!playing;play.textContent=playing?'Ⅱ':'▶';system.style.animationPlayState=playing?'running':'paused'};speed.onchange=()=>system.style.animationDuration=(5/+speed.value)+'s';track.onclick=e=>{time=e.offsetX/track.clientWidth*100;draw()};
size.oninput=()=>{sizeVal.textContent=size.value+'px';let n=size.value*3.2;selection.style.width=selection.style.height=n+'px';system.style.width=system.style.height=(size.value*2.55)+'px'};rot.oninput=()=>{rotVal.textContent=rot.value+'°';system.style.transform=`rotate(${rot.value}deg)`};blur.oninput=()=>{blurVal.textContent=blur.value+'px';core.style.boxShadow=`0 12px ${blur.value*2}px ${color.value}66`};color.oninput=()=>{document.documentElement.style.setProperty('--orange',color.value);core.style.boxShadow=`0 12px ${blur.value*2}px ${color.value}66`};theme.onclick=()=>document.body.classList.toggle('dark');document.querySelectorAll('.switch').forEach(x=>x.onclick=()=>x.classList.toggle('on'));document.querySelectorAll('.preset').forEach(x=>x.onclick=()=>{document.querySelectorAll('.preset').forEach(y=>y.classList.remove('on'));x.classList.add('on')});
function toast(t){let x=document.getElementById('toast');x.textContent='✓ '+t;x.style.display='block';setTimeout(()=>x.style.display='none',1700)}render();timer=setInterval(tick,45);
</script></body></html>
